<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>IoT Prototype Dashboard</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: var(--font-sans); background: transparent; color: var(--text-primary); }
  .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; padding: 1rem 0; }
  .card { background: var(--surface-2); border: 0.5px solid var(--border); border-radius: 12px; padding: 1rem 1.25rem; }
  .card-full { grid-column: 1 / -1; }
  .card-label { font-size: 12px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 8px; display: flex; align-items: center; gap: 6px; }
  .status-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--fill-danger); flex-shrink: 0; }
  .status-dot.connected { background: var(--fill-success); }
  .status-text { font-size: 14px; font-weight: 500; color: var(--text-secondary); }
  .status-text.connected { color: var(--text-success); }
  .relay-buttons { display: flex; gap: 8px; margin-top: 4px; }
  .btn { padding: 8px 18px; border-radius: var(--radius); border: 0.5px solid var(--border-strong); background: transparent; color: var(--text-primary); font-size: 14px; cursor: pointer; font-family: var(--font-sans); transition: background 0.1s; }
  .btn:hover { background: var(--surface-1); }
  .btn:active { transform: scale(0.98); }
  .btn-on { border-color: var(--border-success); color: var(--text-success); }
  .btn-on:hover { background: var(--bg-success); }
  .btn-off { border-color: var(--border-danger); color: var(--text-danger); }
  .btn-off:hover { background: var(--bg-danger); }
  .relay-state { display: flex; align-items: center; gap: 10px; margin-top: 8px; }
  .relay-pill { padding: 3px 10px; border-radius: 999px; font-size: 12px; font-weight: 500; background: var(--bg-danger); color: var(--text-danger); border: 0.5px solid var(--border-danger); }
  .relay-pill.on { background: var(--bg-success); color: var(--text-success); border-color: var(--border-success); }
  .metric-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 4px; }
  .metric { background: var(--surface-1); border-radius: var(--radius); padding: 10px 12px; }
  .metric-val { font-size: 22px; font-weight: 500; line-height: 1.2; }
  .metric-key { font-size: 12px; color: var(--text-muted); margin-top: 2px; }
  .log-area { font-family: var(--font-mono); font-size: 12px; color: var(--text-secondary); max-height: 180px; overflow-y: auto; line-height: 1.6; margin-top: 4px; }
  .log-line { padding: 2px 0; border-bottom: 0.5px solid var(--border); }
  .log-line:last-child { border-bottom: none; }
  .log-ts { color: var(--text-muted); margin-right: 6px; }
  .log-topic { color: var(--text-accent); margin-right: 6px; }
  .pending-area { font-family: var(--font-mono); font-size: 12px; color: var(--text-secondary); margin-top: 4px; min-height: 32px; }
  .pending-none { color: var(--text-muted); font-style: italic; font-family: var(--font-sans); font-size: 13px; }
  .pending-row { display: flex; justify-content: space-between; padding: 3px 0; border-bottom: 0.5px solid var(--border); }
  .pending-id { color: var(--text-muted); overflow: hidden; text-overflow: ellipsis; max-width: 200px; white-space: nowrap; }
  .sensor-row { display: flex; align-items: center; justify-content: space-between; margin-top: 6px; }
  .sensor-val { font-size: 20px; font-weight: 500; }
  .sensor-badge { font-size: 12px; padding: 2px 8px; border-radius: 999px; background: var(--bg-accent); color: var(--text-accent); border: 0.5px solid var(--border-accent); }
  .section-title { font-size: 11px; font-weight: 500; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 10px; display: flex; align-items: center; gap: 6px; }
  .divider { border: none; border-top: 0.5px solid var(--border); margin: 10px 0; }
  .device-id { font-family: var(--font-mono); font-size: 13px; color: var(--text-accent); }
</style>
</head>
<h2 class="sr-only">IoT prototype dashboard — relay control and telemetry monitor</h2>

<div class="grid">

  <div class="card">
    <div class="card-label">
      <span class="status-dot" id="dot"></span>
      Broker connection
    </div>
    <div class="status-text" id="conn-text">Disconnected</div>
    <div style="margin-top:8px; font-size:12px; color:var(--text-muted);">
      Device: <span class="device-id" id="device-id-label">pi01</span>
    </div>
  </div>

  <div class="card">
    <div class="card-label">Relay 1 state</div>
    <div class="relay-state">
      <div class="relay-pill" id="relay-pill">OFF</div>
      <span style="font-size:13px;color:var(--text-muted);" id="relay-ts">—</span>
    </div>
    <div class="relay-buttons" style="margin-top:12px;">
      <button class="btn btn-on" onclick="sendRelayCommand(true)">
        <i class="ti ti-bolt" aria-hidden="true"></i> Turn on
      </button>
      <button class="btn btn-off" onclick="sendRelayCommand(false)">
        <i class="ti ti-bolt-off" aria-hidden="true"></i> Turn off
      </button>
    </div>
  </div>

  <div class="card">
    <div class="card-label">Sensor telemetry — loopA</div>
    <div class="sensor-row">
      <div class="sensor-val" id="loopA-val">—</div>
      <div class="sensor-badge" id="loopA-badge" style="display:none">live</div>
    </div>
    <div style="font-size:12px;color:var(--text-muted);margin-top:6px;" id="loopA-ts">Waiting for data…</div>
  </div>

  <div class="card">
    <div class="card-label">Stats</div>
    <div class="metric-row">
      <div class="metric">
        <div class="metric-val" id="stat-cmds">0</div>
        <div class="metric-key">Commands sent</div>
      </div>
      <div class="metric">
        <div class="metric-val" id="stat-telem">0</div>
        <div class="metric-key">Telemetry received</div>
      </div>
    </div>
  </div>

  <div class="card card-full">
    <div class="card-label">Pending commands</div>
    <div class="pending-area" id="pending-area">
      <div class="pending-none">No pending commands</div>
    </div>
  </div>

  <div class="card card-full">
    <div class="card-label">MQTT log</div>
    <div class="log-area" id="log-area">
      <div class="log-line"><span class="log-ts">—</span><span style="color:var(--text-muted)">Waiting for connection…</span></div>
    </div>
  </div>

</div>
</html>
<script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>
<script>
const deviceId = "pi01";
const BROKER_WS = "ws://127.0.0.1:8888";

const pendingRequests = new Map();
let cmdCount = 0;
let telemCount = 0;

const dot         = document.getElementById("dot");
const connText    = document.getElementById("conn-text");
const relayPill   = document.getElementById("relay-pill");
const relayTs     = document.getElementById("relay-ts");
const loopAVal    = document.getElementById("loopA-val");
const loopATs     = document.getElementById("loopA-ts");
const loopABadge  = document.getElementById("loopA-badge");
const logArea     = document.getElementById("log-area");
const pendingArea = document.getElementById("pending-area");
const statCmds    = document.getElementById("stat-cmds");
const statTelem   = document.getElementById("stat-telem");

function ts() {
  return new Date().toLocaleTimeString([], { hour: "2-digit", minute: "2-digit", second: "2-digit" });
}

function addLog(topic, payload) {
  const line = document.createElement("div");
  line.className = "log-line";
  const preview = typeof payload === "object" ? JSON.stringify(payload) : String(payload);
  line.innerHTML = `<span class="log-ts">${ts()}</span><span class="log-topic">${topic}</span><span>${preview.slice(0, 80)}</span>`;
  if (logArea.firstChild && logArea.firstChild.textContent.includes("Waiting")) logArea.innerHTML = "";
  logArea.prepend(line);
  if (logArea.children.length > 40) logArea.removeChild(logArea.lastChild);
}

function refreshPending() {
  if (pendingRequests.size === 0) {
    pendingArea.innerHTML = '<div class="pending-none">No pending commands</div>';
    return;
  }
  pendingArea.innerHTML = "";
  for (const [id, cmd] of pendingRequests) {
    const row = document.createElement("div");
    row.className = "pending-row";
    row.innerHTML = `<span class="pending-id">${id}</span><span style="color:var(--text-muted);font-size:11px;">relay ${cmd.relay} → ${cmd.state ? "ON" : "OFF"}</span>`;
    pendingArea.appendChild(row);
  }
}

const client = mqtt.connect(BROKER_WS);

client.on("connect", () => {
  dot.classList.add("connected");
  connText.textContent = "Connected";
  connText.classList.add("connected");
  client.subscribe(`devices/${deviceId}/ack`);
  client.subscribe(`devices/${deviceId}/state`);
  client.subscribe(`devices/${deviceId}/telemetry/#`);
  addLog("system", "Connected to broker");
});

client.on("reconnect", () => {
  dot.classList.remove("connected");
  connText.textContent = "Reconnecting…";
  connText.classList.remove("connected");
});

client.on("close", () => {
  dot.classList.remove("connected");
  connText.textContent = "Disconnected";
  connText.classList.remove("connected");
  addLog("system", "Disconnected");
});

client.on("error", (err) => addLog("error", err.message));

client.on("message", (topic, message) => {
  let payload;
  try { payload = JSON.parse(message.toString()); } catch { payload = message.toString(); }
  addLog(topic, payload);

  if (topic.endsWith("/ack") && payload.requestId) {
    pendingRequests.delete(payload.requestId);
    refreshPending();
  }

  if (topic.endsWith("/state")) {
    const isOn = payload.state === true;
    relayPill.textContent = isOn ? "ON" : "OFF";
    relayPill.className = "relay-pill" + (isOn ? " on" : "");
    relayTs.textContent = new Date(payload.ts).toLocaleTimeString();
  }

  if (topic.includes("/telemetry/loopA")) {
    telemCount++;
    statTelem.textContent = telemCount;
    loopAVal.textContent = payload.value;
    loopATs.textContent = "Last update: " + new Date(payload.ts).toLocaleTimeString();
    loopABadge.style.display = "inline";
  }
});

function sendRelayCommand(state) {
  const requestId = crypto.randomUUID();
  const command = { requestId, deviceId, relay: 1, state };
  pendingRequests.set(requestId, command);
  cmdCount++;
  statCmds.textContent = cmdCount;
  refreshPending();
  addLog(`devices/${deviceId}/commands/relay`, command);
  client.publish(`devices/${deviceId}/commands/relay`, JSON.stringify(command));
}
</script>
